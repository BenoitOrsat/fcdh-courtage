// ── Drive helpers ─────────────────────────────────────────────────
function fmtDate(v) {
  if (!v) return '';
  if (v instanceof Date) {
    const y = v.getFullYear();
    if (y < 1900 || y > 2200) return '';
    return `${String(v.getDate()).padStart(2,'0')}/${String(v.getMonth()+1).padStart(2,'0')}/${y}`;
  }
  const s = String(v).trim();
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[3]}/${m[2]}/${m[1]}`;
  return s;
}
function fmtPrix(v) {
  if (v == null || v === '') return '';
  const n = parseFloat(String(v).replace(',','.'));
  if (isNaN(n)) return String(v);
  return n.toFixed(2).replace('.',',') + ' €';
}
function parsePrixNum(s) {
  if (!s) return '';
  const n = parseFloat(String(s).replace(' €','').replace(',','.'));
  return isNaN(n) ? s : n;
}

function parseSheet(wb, sheetName, type) {
  const ws = wb.Sheets[sheetName];
  if (!ws) return [];
  const cols = type === 'bouteilles' ? BTL : VCL;
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:true});
  const result = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    const campagne = String(row[cols.campagne]||'').trim();
    const statut   = String(row[cols.statut]||'').trim();
    if (!campagne) continue;
    const g = c => String(row[c]||'').trim();
    const entry = {
      id: result.length + 1,
      campagne, statut,
      date: fmtDate(row[cols.date]),
      courtier: g(cols.courtier), client: g(cols.client),
      vn: (g(cols.vn)||'V').toUpperCase(), besoin: g(cols.besoin)||'Vend',
      acheteur: g(cols.acheteur), qte: g(cols.qte),
      prix: fmtPrix(row[cols.prix]), commentaires: g(cols.commentaires),
      _sheet: sheetName, _row: i,
    };
    if (type === 'bouteilles') {
      const normFormat = v => v==="bouteille"?"Bouteille":v;
      const normCouleur = v => {
        if(/ch[eê]ne.*(cannelle|antique)|antique.*ch[eê]ne/i.test(v)) return "chêne/antique";
        if(/^ch[eê]ne$/i.test(v)) return "chêne/antique";
        return v;
      };
      const normCru = v => {
        if(/grand.?cru.*1er|1er.*grand.?cru/i.test(v)) return "1er Cru / Grand Cru";
        if(/grand.?cru/i.test(v)) return "Grand Cru";
        if(/1er.?cru/i.test(v)) return "1er Cru";
        return v;
      };
      const normMillesime = v => {
        const m = v.match(/\b(1[89]\d{2}|20[0-2]\d)\b/);
        return m ? m[1] : v;
      };
      const normQualite = v => {
        // BLANC DE BLANCS
        if(/^(BDB|BDB\s*\(.*\)|BLANCS\s+DE\s+BLANCS|Base\s+blanc|BLANC\s+DE\s+BLANCS\s+(1er|GRAND|CRU|BIO|CRVC).*)$/i.test(v)) return "BLANC DE BLANCS";
        // BLANC DE NOIRS (typo uniquement)
        if(/^BLANC\s+DE\s+NOIR$/i.test(v)) return "BLANC DE NOIRS";
        // ROSÉ DE SAIGNÉE
        if(/^ROS[EÉ]\s+DE\s+SAIGN[EÉ]{1,2}$/i.test(v)) return "ROSÉ DE SAIGNÉE";
        // ROSÉ (sans accent ou minuscule, mais pas les variantes spécifiques)
        if(/^ROS[EÉ]$/i.test(v)) return "ROSÉ";
        return v;
      };
      Object.assign(entry, {
        format: normFormat(g(cols.format)||'Bouteille'), modele: g(cols.modele),
        couleur: normCouleur(g(cols.couleur)), stade: g(cols.stade),
        qualite: normQualite(g(cols.qualite)), cru: normCru(g(cols.cru)),
        assemblage: g(cols.assemblage), millesime: normMillesime(g(cols.millesime)),
        tirage: fmtDate(row[cols.tirage]),
      });
    } else {
      Object.assign(entry, {
        vendange: g(cols.vendange), formatVin: g(cols.formatVin),
        qualite: g(cols.qualite), cru: g(cols.cru),
        cepage: g(cols.cepage), assemblage: g(cols.assemblage), crus: g(cols.crus),
      });
    }
    result.push(entry);
  }
  return result;
}

function parseCotationRows(rows, memoCol) {
  const result = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row[0]) continue;
    const g = c => String(row[c]||'').trim();
    const prix = parseFloat(String(row[6]||'0').replace(',','.').replace(/[^\d.]/g,'')) || 0;
    const qte  = parseFloat(String(row[5]||'0').replace(',','.').replace(/[^\d.]/g,'')) || 0;
    result.push({
      courtier: g(0), date: fmtDate(row[1]), numero: g(2),
      acheteur: g(3), vendeur: g(4), qte, prix,
      mention: g(7), code: g(8), memo: g(memoCol),
    });
  }
  return result;
}

function entryToRowArray(entry, existingRow, type) {
  const cols = type === 'bouteilles' ? BTL : VCL;
  const maxCol = Math.max(...Object.values(cols));
  const row = existingRow ? [...existingRow] : [];
  while (row.length <= maxCol) row.push('');
  row[cols.statut]      = entry.statut;
  row[cols.date]        = entry.date;
  row[cols.courtier]    = entry.courtier;
  row[cols.client]      = entry.client;
  row[cols.vn]          = entry.vn;
  row[cols.besoin]      = entry.besoin;
  row[cols.acheteur]    = entry.acheteur;
  row[cols.qte]         = entry.qte;
  row[cols.prix]        = parsePrixNum(entry.prix);
  row[cols.commentaires]= entry.commentaires;
  if (type === 'bouteilles') {
    row[cols.format]    = entry.format;
    row[cols.modele]    = entry.modele;
    row[cols.couleur]   = entry.couleur;
    row[cols.stade]     = entry.stade;
    row[cols.qualite]   = entry.qualite;
    row[cols.cru]       = entry.cru;
    row[cols.assemblage]= entry.assemblage;
    row[cols.millesime] = entry.millesime;
    row[cols.tirage]    = entry.tirage;
  } else {
    row[cols.vendange]  = entry.vendange;
    row[cols.formatVin] = entry.formatVin;
    row[cols.qualite]   = entry.qualite;
    row[cols.cru]       = entry.cru;
    row[cols.cepage]    = entry.cepage;
    row[cols.assemblage]= entry.assemblage;
    row[cols.crus]      = entry.crus;
  }
  return row;
}

// ── Name matching ─────────────────────────────────────────────────
const NAME_ALIASES = {
  "CANARD - DUCHÊNE":"CANARD DUCHENE","CANARD-DUCHÊNE":"CANARD DUCHENE",
  "FOURRIER DELMOTTE":"FOURRIER","LE SUCHOT":"SUCHOT","MALETREZ FREDERIC":"MALETREZ",
  "EPC":"GRINCLAIR","GRINCLAIR":"GRINCLAIR","E.P.C.":"GRINCLAIR",
};
// Mots génériques qui ne doivent pas déclencher un match à eux seuls
const NAME_STOP_WORDS = new Set([
  "CHAMPAGNE","MAISON","DOMAINE","CAVE","CAVES","VIGNOBLE","VIGNOBLES",
  "DE","DU","LA","LE","LES","ET","EN","SUR","SOUS","AU","AUX","&",
  "SA","SAS","SARL","SCI","SCE","GFA","EARL","GAEC","SCA",
  "VINS","VIN","VIGNE","VIGNES","BLANC","ROUGE","ROSE","ROSÉ",
]);
function normalizeName(n) {
  if (!n) return "";
  const u = n.trim().toUpperCase().replace(/['']/g,"'").replace(/[-–]/g," ");
  for (const [k,v] of Object.entries(NAME_ALIASES)) if (u===k.toUpperCase()) return v.toUpperCase();
  return u;
}
function namesMatch(a,b) {
  const na=normalizeName(a),nb=normalizeName(b);
  // Une valeur vide ne génère jamais de match
  if (!na||!nb) return false;
  if (na===nb) return true;
  // Inclusion substring seulement si la valeur incluse n'est pas un stop word seul
  if (na.includes(nb)&&!NAME_STOP_WORDS.has(nb)) return true;
  if (nb.includes(na)&&!NAME_STOP_WORDS.has(na)) return true;
  // Option A : tous les mots significatifs du nom le plus court
  // doivent être présents dans le nom le plus long
  const sigWords = s => s.split(/\s+/).filter(t=>t.length>2&&!NAME_STOP_WORDS.has(t));
  const ta=sigWords(na), tb=sigWords(nb);
  if (ta.length===0||tb.length===0) return false;
  const [shorter,longer] = ta.length<=tb.length ? [ta,tb] : [tb,ta];
  return shorter.every(t=>longer.includes(t));
}

// ── Score helpers ─────────────────────────────────────────────────
function parseQty(q) {
  if (!q) return null;
  const s=String(q).replace(/\s/g,"").replace(",",".");
  const range=s.match(/^([\d.]+)[-/]([\d.]+)$/);
  if (range) return (parseFloat(range[1])+parseFloat(range[2]))/2;
  const mult=s.match(/^(\d+)\*(\d+)$/);
  if (mult) return parseInt(mult[1])*parseInt(mult[2]);
  return parseFloat(s.replace(/[^0-9.]/g,""))||null;
}
function qtysCompatible(q1,q2) {
  const a=parseQty(q1),b=parseQty(q2);
  if (!a||!b) return true;
  return Math.max(a,b)/Math.min(a,b)<=5;
}
function scoreMatch(v,a,type) {
  let score=0,details=[],malus=[];
  if (!qtysCompatible(v.qte,a.qte)) return {score:0,details:[],malus:["Quantités incompatibles"]};
  if (type==="bouteilles") {
    if (v.qualite&&a.qualite){if(v.qualite===a.qualite){score+=4;details.push("Qualité ✓");}else return {score:0,details:[],malus:["Qualité incompatible"]};}
    if (v.format&&a.format){if(v.format===a.format){score+=3;details.push("Format ✓");}else return {score:0,details:[],malus:["Format incompatible"]};}
    if (v.couleur&&a.couleur&&v.couleur===a.couleur){score+=2;details.push("Couleur ✓");}
    if (v.stade&&a.stade&&v.stade===a.stade){score+=2;details.push("Stade ✓");}
    if (v.cru&&a.cru&&v.cru===a.cru){score+=3;details.push("Cru ✓");}
    if (v.millesime&&a.millesime){if(v.millesime===a.millesime){score+=4;details.push("Millésime ✓");}else malus.push("Millésime ✗");}
  } else {
    if (v.qualite&&a.qualite){if(v.qualite===a.qualite){score+=2;details.push("Qualité ✓");}else return {score:0,details:[],malus:["Qualité incompatible"]};}
    if (v.vendange&&a.vendange){if(v.vendange===a.vendange){score+=4;details.push("Vendange ✓");}else malus.push("Vendange ✗");}
    if (v.cepage&&a.cepage){const x=v.cepage,y=a.cepage;if(x===y||x.includes(y)||y.includes(x)){score+=4;details.push("Cépage ✓");}else malus.push("Cépage ✗");}
    if (v.cru&&a.cru&&(v.cru===a.cru||v.cru.includes(a.cru)||a.cru.includes(v.cru))){score+=3;details.push("Cru ✓");}
    if (v.formatVin&&a.formatVin&&v.formatVin===a.formatVin){score+=1;details.push("Format ✓");}
  }
  return {score,details,malus};
}
const STATUTS_ACTIFS = ["en attente","en dégustation"];
function bestScore(entry,all,type) {
  const opp=entry.besoin==="Vend"?"Recherche":"Vend";
  const c=all.filter(r=>r.id!==entry.id&&r.besoin===opp&&STATUTS_ACTIFS.includes(r.statut));
  if (!c.length) return 0;
  return Math.max(...c.map(r=>scoreMatch(entry,r,type).score));
}
function scoreBoxColor(s){if(s>=10)return{bg:"#10b981",col:"#fff"};if(s>=6)return{bg:"#f59e0b",col:"#fff"};if(s>=3)return{bg:"#f97316",col:"#fff"};return{bg:G200,col:G600};}
function scorePillStyle(s){if(s>=10)return{bg:"#d1fae5",col:"#065f46",bdr:"#6ee7b7"};if(s>=6)return{bg:"#fef9c3",col:"#854d0e",bdr:"#fde68a"};if(s>=3)return{bg:"#ffedd5",col:"#9a3412",bdr:"#fed7aa"};return{bg:G100,col:G400,bdr:G200};}

const InlineText=({value,onChange,placeholder="—"})=>{
  const [editing,setEditing]=React.useState(false);
  const [val,setVal]=React.useState(value||"");
  React.useEffect(()=>{setVal(value||"");},[value]);

  useEffect(()=>{localStorage.setItem('fcdh_btl_order',JSON.stringify(btlOrder));},[btlOrder]);

      scope: DRIVE_SCOPE,
      callback: (resp) => {
        if (resp.error) { setGError("Auth Google : " + resp.error); return; }

        setGError("");

      },
    });
    tc.requestAccessToken();

  // ── Reconnexion silencieuse sur token expiré (401) ──────────────

    if (!window.google?.accounts?.oauth2) { setGError("Impossible de rafraîchir la session."); return; }
    setGError("Session expirée — reconnexion automatique…");
    const tc = window.google.accounts.oauth2.initTokenClient({
      client_id: gClientId,
      scope: DRIVE_SCOPE,
      callback: (resp) => {
        if (resp.error) { setGError("Reconnexion échouée : " + resp.error); return; }
        setGToken(resp.access_token);
        setGError("");
        retryFn(resp.access_token);
      },
    });
    tc.requestAccessToken({prompt: ''});
  };

  // ── Load from Drive ─────────────────────────────────────────────
  const loadFromDrive = async (token) => {
    setGLoading(true); setGError("");
    try {
      const resp = await fetch(
        `https://www.googleapis.com/drive/v3/files/${DRIVE_FILE_ID}?alt=media`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      if (resp.status === 401) { setGLoading(false); reAuthAndRetry(loadFromDrive); return; }
      if (!resp.ok) throw new Error(`Drive ${resp.status}: ${await resp.text()}`);
      const buf = await resp.arrayBuffer();
      const wb  = XLSX.read(buf, {type:'array', cellDates:true});
      driveWbRef.current = wb;

      rawRowsRef.current = {
        'BOUTEILLES':  XLSX.utils.sheet_to_json(wb.Sheets['BOUTEILLES'],  {header:1, defval:'', raw:true}),
        'VINS CLAIRS': XLSX.utils.sheet_to_json(wb.Sheets['VINS CLAIRS'], {header:1, defval:'', raw:true}),
      };

      const btlData = parseSheet(wb, 'BOUTEILLES', 'bouteilles');
      const vcData  = parseSheet(wb, 'VINS CLAIRS', 'vinsclairs');

      // Migrate old-campaign entries still "en attente"/"en dégustation" → "abandon"
      const needsMigration = {BOUTEILLES: false, 'VINS CLAIRS': false};
      for (const e of btlData) {
        if (e.campagne !== CAMPAGNE && ['en attente','en dégustation'].includes(e.statut)) {
          e.statut = 'abandon';
          rawRowsRef.current['BOUTEILLES'][e._row][BTL.statut] = 'abandon';
          needsMigration['BOUTEILLES'] = true;
        }
      }
      for (const e of vcData) {
        if (e.campagne !== CAMPAGNE && ['en attente','en dégustation'].includes(e.statut)) {
          e.statut = 'abandon';
          rawRowsRef.current['VINS CLAIRS'][e._row][VCL.statut] = 'abandon';
          needsMigration['VINS CLAIRS'] = true;
        }
      }
      if (needsMigration['BOUTEILLES'] || needsMigration['VINS CLAIRS']) {
        for (const sk of ['BOUTEILLES','VINS CLAIRS']) {
          if (!needsMigration[sk]) continue;
          const origWs = wb.Sheets[sk];
          const newWs  = XLSX.utils.aoa_to_sheet(rawRowsRef.current[sk]);
          if (origWs['!cols'])   newWs['!cols']   = origWs['!cols'];
          if (origWs['!merges']) newWs['!merges'] = origWs['!merges'];
          wb.Sheets[sk] = newWs;
        }
        const out  = XLSX.write(wb, {bookType:'xlsx', type:'array'});
        const blob = new Blob([out], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
        await fetch(
          `https://www.googleapis.com/upload/drive/v3/files/${DRIVE_FILE_ID}?uploadType=media`,
          {method:'PATCH', headers:{Authorization:`Bearer ${token}`, 'Content-Type':blob.type}, body:blob}
        );
      }

      origRowsRef.current = {
        'BOUTEILLES':  btlData.map(e => e._row),
        'VINS CLAIRS': vcData.map(e => e._row),
      };

      setBouteilles(btlData);
      setVinsClairs(vcData);
      setDriveLoaded(true);

      // Load cotation files only once at startup
      if (!cotLoadedRef.current) {
        const loadCotFile = async (fileId, memoCol) => {
          try {
            const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {headers:{Authorization:`Bearer ${token}`}});
            if (!r.ok) return [];
            const wb2 = XLSX.read(await r.arrayBuffer(), {type:'array', cellDates:true});
            const ws2 = wb2.Sheets[wb2.SheetNames[0]];
            return parseCotationRows(XLSX.utils.sheet_to_json(ws2, {header:1, defval:'', raw:true}), memoCol);
          } catch { return []; }

          loadCotFile(DRIVE_COTATION_BT_ID, 9),
          loadCotFile(DRIVE_COTATION_VC_ID, 10),
        ]);
        setCotationsBT(btCot);
        setCotationsVC(vcCot);
        cotLoadedRef.current = true;

      setGError("Chargement : " + e.message);
    }
    setGLoading(false);

  // ── Save to Drive ───────────────────────────────────────────────
  const saveToDrive = async (tokenOverride) => {
    const token = tokenOverride || gToken;
    if (!token || !driveWbRef.current) return;
    setGLoading(true); setGError("");
    try {
      const wb = driveWbRef.current;

      const syncSheetAoA = (sheetKey, entries, type) => {
        let rawRows = rawRowsRef.current[sheetKey].map(r => [...r]);
        const cols = type === 'bouteilles' ? BTL : VCL;
        const origRowSet = new Set(origRowsRef.current[sheetKey]);
        const entryRowMap = new Map();

        for (const e of entries) {
          if (e._row !== undefined) entryRowMap.set(e._row, e);
        }
        // Update existing rows in place
        for (const [rowIdx, entry] of entryRowMap) {
          rawRows[rowIdx] = entryToRowArray(entry, rawRows[rowIdx], type);
        }
        // Permanently delete rows that were removed from the app
        const rowsToDelete = new Set([...origRowSet].filter(r => !entryRowMap.has(r)));
        if (rowsToDelete.size > 0) {
          const deletedSorted = [...rowsToDelete].sort((a, b) => a - b);
          rawRows = rawRows.filter((_, idx) => !rowsToDelete.has(idx));
          // Fix _row offsets on all remaining entries
          for (const e of entries) {
            if (e._row !== undefined) {
              e._row -= deletedSorted.filter(r => r < e._row).length;
            }
          }
        }
        // Insert new entries right after the last existing managed row
        const newEntries = entries.filter(e => e._row === undefined);
        if (newEntries.length > 0) {
          const existingIndices = entries.filter(e => e._row !== undefined).map(e => e._row);
          let insertAt = existingIndices.length > 0
            ? Math.max(...existingIndices) + 1
            : rawRows.length;
          for (const e of newEntries) {
            const newRow = entryToRowArray(e, null, type);
            newRow[cols.campagne] = CAMPAGNE;
            rawRows.splice(insertAt, 0, newRow);
            e._row = insertAt;
            for (const ex of entries) {
              if (ex._row !== undefined && ex._row > insertAt) ex._row++;
            }
            insertAt++;
          }
        }

        const newWs = XLSX.utils.aoa_to_sheet(rawRows);
        const origWs = wb.Sheets[sheetKey];
        if (origWs['!cols'])   newWs['!cols']   = origWs['!cols'];
        if (origWs['!merges']) newWs['!merges'] = origWs['!merges'];
        wb.Sheets[sheetKey] = newWs;
        rawRowsRef.current[sheetKey] = rawRows;
      };

      syncSheetAoA('BOUTEILLES',  bouteilles, 'bouteilles');
      syncSheetAoA('VINS CLAIRS', vinsClairs, 'vinsclairs');

      const out  = XLSX.write(wb, {bookType:'xlsx', type:'array'});
      const blob = new Blob([out], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});

      const up = await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${DRIVE_FILE_ID}?uploadType=media`,
        { method:'PATCH', headers:{Authorization:`Bearer ${token}`, 'Content-Type': blob.type}, body: blob }
      );
      if (up.status === 401) { setGLoading(false); reAuthAndRetry(t => saveToDrive(t)); return; }

      origRowsRef.current = {
        'BOUTEILLES':  bouteilles.map(e=>e._row).filter(r=>r!==undefined),
        'VINS CLAIRS': vinsClairs.map(e=>e._row).filter(r=>r!==undefined),
      };
      setGSaved(true);
      setTimeout(()=>setGSaved(false), 3000);

      setGError("Sauvegarde : " + e.message);
    }
    setGLoading(false);
  };

  // ── Web search ──────────────────────────────────────────────────
  const runWebSearch=async(exclude=[])=>{
    if(!apiKey){setWebErr("Clé API Anthropic manquante — configurez-la dans ⚙️.");return;}
    const entry=modal.entry;const key=entry.id+"_"+tab;
    setWebLoad(true);setWebErr("");

      const crit=[entry.qualite&&`qualité "${entry.qualite}"`,entry.cru&&`cru "${entry.cru}"`,entry.format&&entry.format!=="Bouteille"&&`format "${entry.format}"`,entry.couleur&&`bouteille ${entry.couleur}`,entry.stade==="S/L"&&"sur lattes",entry.stade==="S/P"&&"sur pointes",entry.millesime&&`millésime ${entry.millesime}`,entry.vendange&&`vendange ${entry.vendange}`,entry.cepage&&`cépage ${entry.cepage}`,entry.assemblage&&`assemblage ${entry.assemblage}`,entry.crus&&`crus ${entry.crus}`].filter(Boolean).join(", ");
      const ex=exclude.length?`\nExclure : ${exclude.join(", ")}.`:"";
      const prompt=`Tu es expert en vins de Champagne. Trouve 5 producteurs champenois réels pour : ${crit}.${ex}\nAttention : propose UNIQUEMENT des RM, RC ou CM. Exclus impérativement les NM et ND.\nPour chacun : nom, commune, statut (RM/RC/CM), description produit 2 phrases max, URL image.\nRéponds UNIQUEMENT JSON : [{"nom":"...","commune":"...","statut":"...","description":"...","image":"..."},...]`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:2000,tools:[{"type":"web_search_20250305","name":"web_search"}],messages:[{role:"user",content:prompt}]})});
      const d=await res.json();if(d.error)throw new Error(d.error.message);

  // ── Render helpers ──────────────────────────────────────────────
  const selStyle={border:`1px solid ${G200}`,borderRadius:8,padding:"8px 12px",fontSize:13,color:TEXT,background:WHITE,outline:"none"};

  const renderCriteres=(entry)=>{
    const chips=[entry.qte&&{l:"Qté",v:entry.qte+(tab==="vinsclairs"?" hl":"")},tab==="bouteilles"&&entry.format&&{l:"Format",v:entry.format},tab==="bouteilles"&&entry.couleur&&{l:"Couleur",v:entry.couleur},tab==="bouteilles"&&entry.stade&&{l:"Stade",v:entry.stade},entry.qualite&&{l:"Qualité",v:entry.qualite},entry.cru&&{l:"Cru",v:entry.cru},entry.assemblage&&{l:"Assemblage",v:entry.assemblage},tab==="bouteilles"&&entry.millesime&&{l:"Millésime",v:entry.millesime},tab==="vinsclairs"&&entry.vendange&&{l:"Vendange",v:entry.vendange},tab==="vinsclairs"&&entry.cepage&&{l:"Cépage",v:entry.cepage},entry.prix&&{l:"Prix",v:entry.prix}].filter(Boolean);

      {/* ── Settings modal ── */}
      {showSettings && (

            <div style={{marginBottom:20}}>

                2. APIs → Google Drive API → Activer<br/>
                3. Identifiants → OAuth 2.0 → Web → Origine : <code style={{background:G100,padding:"1px 5px",borderRadius:4}}>http://localhost:8080</code><br/>
                4. Copier le Client ID ci-dessus<br/>
                5. Lancer : <code style={{background:G100,padding:"1px 5px",borderRadius:4}}>python3 -m http.server 8080</code>
              </div>
            </div>

            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,fontWeight:700,color:GOLD,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Clé API Anthropic (recherche web)</div>

            </div>

            <button onClick={()=>setShowSettings(false)} style={{width:"100%",background:NAVY,color:GOLD,border:"none",borderRadius:10,padding:12,fontWeight:700,fontSize:14,cursor:"pointer"}}>Fermer</button>
          </div>
        </div>

      {/* ── Header ── */}
      <div style={{background:`linear-gradient(135deg,${NAVY} 0%,${BLUE} 100%)`,color:WHITE,padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:64,boxShadow:"0 2px 12px rgba(13,27,62,.4)"}}>
        <div>
          <div style={{fontWeight:700,fontSize:18,color:GOLD,letterSpacing:"0.04em"}}>FCDH Courtiers Associés</div>

        <div style={{display:"flex",gap:8,alignItems:"center"}}>

                <span style={{fontSize:11,color:"#6ee7b7",fontWeight:600}}>📊 Drive ✓</span>
                <button onClick={()=>loadFromDrive(gToken)} title="Recharger depuis Drive" style={{padding:"7px 10px",borderRadius:7,fontSize:13,border:`1px solid ${GOLD}`,background:"transparent",color:GOLD,cursor:"pointer"}}>🔄</button>

      <div style={{background:WHITE,borderBottom:`1px solid ${G100}`,padding:"0 24px",display:"flex"}}>

          </div>
        )}

        {/* ── Confirm delete ── */}
        {delId && (

              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>{setData(prev=>prev.filter(r=>r.id!==delId));setDelId(null);}} style={{flex:1,background:"#dc2626",color:WHITE,border:"none",borderRadius:8,padding:10,fontWeight:700,cursor:"pointer",fontSize:13}}>Supprimer</button>
                <button onClick={()=>setDelId(null)} style={{flex:1,background:G100,color:G600,border:"none",borderRadius:8,padding:10,fontWeight:600,cursor:"pointer",fontSize:13}}>Annuler</button>
              </div>
            </div>
          </div>

        {/* ── Modal ── */}
        {modal && (

                </div>
              </div>

              <div style={{display:"flex",borderBottom:`1px solid ${G100}`,padding:"0 24px"}}>

                  <button key={t.k} onClick={()=>setMTab(t.k)}
                    style={{padding:"12px 16px",fontSize:13,fontWeight:600,border:"none",borderBottom:mTab===t.k?`3px solid ${GOLD}`:"3px solid transparent",background:"none",color:mTab===t.k?NAVY:G400,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                    {t.l}{t.n!==null&&<span style={{background:mTab===t.k?NAVY:G100,color:mTab===t.k?GOLD_L:G400,borderRadius:99,padding:"0 7px",fontSize:11}}>{t.n}</span>}
                  </button>

              </div>
              <div style={{padding:24,maxHeight:"55vh",overflowY:"auto"}}>

                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:4,alignItems:"center"}}>
                            <span style={{fontWeight:700,color:NAVY,fontSize:14}}>{r.client}</span>
                            <span style={{fontWeight:700,color:GOLD,fontSize:12}}>{r.courtier}</span>
                            <Pill v={r.besoin}/>
                            <span style={{fontSize:11,color:G400}}>{r.date}</span>
                            {r.prix&&<span style={{fontWeight:700,color:GOLD,fontSize:12}}>💶 {r.prix}</span>}
                          </div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:8,fontSize:11,color:G400,marginBottom:4}}>
                            {r.qte&&<span>📦 {r.qte}</span>}{r.qualite&&<span>{r.qualite}</span>}{r.cru&&<span>📍 {r.cru}</span>}{r.millesime&&<span>📅 {r.millesime}</span>}{r.vendange&&<span>📅 {r.vendange}</span>}{r.cepage&&<span>🍇 {r.cepage}</span>}
                          </div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                            {r.details.map(d=><span key={d} style={{background:"#d1fae5",color:"#065f46",borderRadius:5,padding:"1px 7px",fontSize:11}}>{d}</span>)}
                            {r.malus&&r.malus.map(d=><span key={d} style={{background:"#fee2e2",color:"#991b1b",borderRadius:5,padding:"1px 7px",fontSize:11}}>{d}</span>)}
                          </div>
                          {r.commentaires&&<div style={{marginTop:4,fontSize:11,color:G400,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.commentaires}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {mTab==="historique"&&(()=>{
                  const COT_COLS=[
                    {id:"date",   label:"Date",    cmp:(a,b)=>{const pd=s=>{const p=s.split("/");return p.length===3?`${p[2]}${p[1]}${p[0]}`:"";};return pd(a.date).localeCompare(pd(b.date));}},
                    {id:"numero", label:"N°",      cmp:(a,b)=>String(a.numero).localeCompare(String(b.numero),undefined,{numeric:true})},
                    {id:"acheteur",label:"Acheteur",cmp:(a,b)=>a.acheteur.localeCompare(b.acheteur)},
                    {id:"vendeur", label:"Vendeur", cmp:(a,b)=>a.vendeur.localeCompare(b.vendeur)},
                    {id:"qte",    label:"Qté",     cmp:(a,b)=>a.qte-b.qte},
                    {id:"prix",   label:"Prix",    cmp:(a,b)=>a.prix-b.prix},
                    {id:"mention",label:"Mention", cmp:(a,b)=>a.mention.localeCompare(b.mention)},
                    {id:"code",   label:"Code",    cmp:(a,b)=>a.code.localeCompare(b.code)},
                  ];
                  const col=COT_COLS.find(c=>c.id===cotSort.col)||COT_COLS[0];
                  const sorted=[...modal.cotations].sort((a,b)=>col.cmp(a,b)*cotSort.dir);
                  const toggleSort=id=>{setCotSort(s=>s.col===id?{col:id,dir:-s.dir}:{col:id,dir:1});};
                  const SortTH=({id,label})=>{
                    const active=cotSort.col===id;
                    return <th onClick={()=>toggleSort(id)} style={{...thStyle,cursor:"pointer",userSelect:"none",background:active?"#e8edf8":G50,whiteSpace:"nowrap"}}>
                      {label}{active?(cotSort.dir===1?" ▲":" ▼"):<span style={{color:G200}}> ⇅</span>}
                    </th>;
                  };
                  return modal.cotations.length===0
                    ?<div style={{textAlign:"center",padding:"40px 0",color:G400}}><div style={{fontSize:36,marginBottom:12}}>📭</div>Aucune cotation trouvée.</div>

                            <TD style={{fontWeight:600}}>{c.acheteur}</TD><TD>{c.vendeur}</TD>
                            <TD style={{textAlign:"right"}}>{c.qte.toLocaleString()}</TD>
                            <TD style={{fontWeight:700,color:GOLD}}>{c.prix.toFixed(2)} €</TD>
                            <TD style={{fontSize:10,color:G400,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis"}}>{c.mention}</TD>
                            <TD><span style={{background:G100,borderRadius:4,padding:"1px 6px",fontFamily:"monospace",fontSize:10}}>{c.code}</span></TD>
                          </tr>
                        ))}</tbody>
                      </table>
                      <div style={{marginTop:10,fontSize:11,color:G400,display:"flex",gap:14}}>
                        <span><span style={{display:"inline-block",width:10,height:10,background:"#dbeafe",borderRadius:2,marginRight:4}}></span>Acheteur</span>
                        <span><span style={{display:"inline-block",width:10,height:10,background:"#d1fae5",borderRadius:2,marginRight:4}}></span>Vendeur</span>
                      </div>
                    </div>;
                })()}
                {mTab==="web"&&(()=>{
                  const key=modal.entry.id+"_"+tab;const results=webRes[key]||[];
                  return <div>
                    {webConfirm&&<div style={{position:"fixed",inset:0,background:"rgba(13,27,62,.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:70}}>
                      <div style={{background:WHITE,borderRadius:14,padding:28,maxWidth:380,width:"100%",margin:"0 16px",boxShadow:"0 8px 40px rgba(13,27,62,.3)"}}>
                        <div style={{fontWeight:700,fontSize:15,color:NAVY,marginBottom:6}}>Nouvelles propositions ?</div>
                        <div style={{fontSize:13,color:G400,marginBottom:20}}>Les producteurs déjà proposés peuvent être exclus.</div>
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          <button onClick={()=>{setWebConfirm(false);runWebSearch(results.map(r=>r.nom));}} style={{background:NAVY,color:GOLD,border:"none",borderRadius:8,padding:10,fontWeight:700,cursor:"pointer",fontSize:13}}>Oui — nouvelles propositions</button>
                          <button onClick={()=>{setWebConfirm(false);runWebSearch([]);}} style={{background:BLUE,color:WHITE,border:"none",borderRadius:8,padding:10,fontWeight:600,cursor:"pointer",fontSize:13}}>Non — relancer depuis le début</button>
                          <button onClick={()=>setWebConfirm(false)} style={{background:G100,color:G600,border:"none",borderRadius:8,padding:10,fontWeight:600,cursor:"pointer",fontSize:13}}>Annuler</button>
                        </div>
                      </div>
                    </div>}
                    {!apiKey&&<div style={{textAlign:"center",padding:"32px 0"}}><div style={{fontSize:36,marginBottom:12}}>🔑</div><p style={{color:G400,fontSize:13,marginBottom:16}}>Clé API Anthropic requise.</p><button onClick={()=>setShowSettings(true)} style={{padding:"9px 20px",background:NAVY,color:GOLD,border:"none",borderRadius:8,fontWeight:600,cursor:"pointer",fontSize:13}}>⚙️ Configurer</button></div>}
                    {apiKey&&!webLoad&&results.length===0&&!webErr&&<div style={{textAlign:"center",padding:"40px 0"}}><div style={{fontSize:44,marginBottom:14}}>🌐</div><p style={{color:G400,fontSize:13,marginBottom:20}}>Recherche web de producteurs correspondant aux critères</p><button onClick={()=>runWebSearch([])} style={{padding:"11px 28px",background:NAVY,color:GOLD,border:"none",borderRadius:9,fontWeight:700,fontSize:13,cursor:"pointer"}}>🔍 Lancer la recherche</button></div>}
                    {webLoad&&<div style={{textAlign:"center",padding:"40px 0",color:G400}}><div style={{fontSize:36,marginBottom:12}}>⏳</div>Recherche en cours...</div>}
                    {webErr&&!webLoad&&<div style={{textAlign:"center",padding:"32px 0"}}><p style={{color:"#dc2626",fontSize:13,marginBottom:14}}>{webErr}</p><button onClick={()=>runWebSearch([])} style={{padding:"9px 20px",background:NAVY,color:GOLD,border:"none",borderRadius:8,fontWeight:600,cursor:"pointer",fontSize:13}}>Réessayer</button></div>}
                    {results.length>0&&!webLoad&&<div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                        <span style={{fontSize:12,fontWeight:600,color:G400}}>{results.length} producteurs trouvés</span>
                        <button onClick={()=>setWebConfirm(true)} style={{padding:"6px 14px",background:NAVY,color:GOLD,border:"none",borderRadius:7,fontWeight:600,fontSize:12,cursor:"pointer"}}>🔄 Relancer</button>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        {results.map((r,i)=>(
                          <div key={i} style={{background:G50,borderRadius:10,border:`1px solid ${G100}`,padding:14,display:"flex",gap:14}}>
                            <div style={{width:72,height:88,borderRadius:8,overflow:"hidden",background:G100,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>
                              {r.image?<img src={r.image} alt={r.nom} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none";e.target.parentNode.textContent="🍾";}}/>:"🍾"}
                            </div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                                <div><span style={{fontWeight:700,fontSize:14,color:NAVY}}>{r.nom}</span>
                                  <div style={{display:"flex",gap:8,marginTop:2}}>
                                    {r.commune&&<span style={{fontSize:11,color:G400}}>📍 {r.commune}</span>}
                                    {r.statut&&<span style={{fontSize:11,background:"#fef9c3",color:"#92400e",border:"1px solid #fde68a",borderRadius:5,padding:"0 6px",fontWeight:600}}>{r.statut}</span>}
                                  </div>
                                </div>
                                <span style={{fontWeight:800,fontSize:16,color:GOLD}}>#{i+1}</span>
                              </div>
                              <p style={{fontSize:12,color:G600,margin:"4px 0 6px"}}>{r.description}</p>
                              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:4}}>
                                <a href={`https://www.google.com/search?q=${encodeURIComponent(r.nom+" champagne site officiel")}`} target="_blank" rel="noreferrer" style={{fontSize:11,color:NAVY,background:G100,border:`1px solid ${G200}`,borderRadius:6,padding:"3px 9px",textDecoration:"none",fontWeight:600}}>🌐 Site officiel</a>
                                <a href={`https://www.google.com/search?q=${encodeURIComponent(r.nom+" champagne "+modal.entry.qualite+" "+modal.entry.cru)}`} target="_blank" rel="noreferrer" style={{fontSize:11,color:NAVY,background:G100,border:`1px solid ${G200}`,borderRadius:6,padding:"3px 9px",textDecoration:"none",fontWeight:600}}>🍾 Rechercher ce produit</a>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>}
                  </div>;
                })()}
              </div>
              <div style={{padding:"16px 24px",borderTop:`1px solid ${G100}`}}>
                <button onClick={()=>setModal(null)} style={{width:"100%",background:NAVY,color:GOLD,border:"none",borderRadius:10,padding:12,fontWeight:700,fontSize:14,cursor:"pointer"}}>Fermer</button>
              </div>
            </div>
          </div>
        )}

        {/* ── Liste ── */}
        {view==="liste" && (bouteilles.length>0||vinsClairs.length>0) && (
          <>
            <div style={{background:WHITE,borderRadius:12,border:`1px solid ${G100}`,padding:"14px 16px",marginBottom:16,display:"flex",flexWrap:"wrap",gap:10,alignItems:"center",boxShadow:"0 1px 4px rgba(13,27,62,.06)"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Recherche libre…" style={{...selStyle,flex:1,minWidth:160}}/>
              <select value={fCampagne} onChange={e=>setFCamp(e.target.value)} style={selStyle}><option value="">Toutes campagnes</option>{campagnes.map(c=><option key={c}>{c}</option>)}</select>
              <select value={fCourtier} onChange={e=>setFC(e.target.value)} style={selStyle}><option value="">Tous les courtiers</option>{COURTIERS.map(c=><option key={c}>{c}</option>)}</select>
              <select value={fBesoin}   onChange={e=>setFB(e.target.value)} style={selStyle}><option value="">Vend & Recherche</option><option>Vend</option><option>Recherche</option></select>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                {STATUTS.map(s=>{const sc=STATUT_COLORS[s]||{bg:G100,col:G600,bdr:G200};const on=fStatuts.includes(s);return <span key={s} onClick={()=>setFS(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s])} style={{background:on?sc.bg:G50,color:on?sc.col:G400,border:`1.5px solid ${on?sc.bdr:G200}`,borderRadius:99,padding:"5px 11px",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",userSelect:"none"}}>{s}</span>;})}
                {fStatuts.length>0&&<span onClick={()=>setFS([])} style={{fontSize:11,color:G400,cursor:"pointer",textDecoration:"underline",whiteSpace:"nowrap"}}>tout</span>}
              </div>
              <select value={sortBy}    onChange={e=>setSortBy(e.target.value)} style={selStyle}><option value="date">Date ↓</option><option value="score">Score ↓</option></select>
              <span style={{fontSize:11,color:G400,marginLeft:"auto"}}>{filtered.length} entrée(s)</span>
            </div>
            <div style={{background:WHITE,borderRadius:12,border:`1px solid ${G100}`,overflow:"auto",boxShadow:"0 1px 4px rgba(13,27,62,.06)"}}>
              {(()=>{
                const colDefs=tab==="bouteilles"?COLS.bouteilles:COLS.vinsclairs;
                const colOrder=tab==="bouteilles"?btlOrder:vcOrder;
                const setColOrder=tab==="bouteilles"?setBtlOrder:setVcOrder;
                const ordered=colOrder.map(id=>colDefs.find(c=>c.id===id)).filter(Boolean);
                return <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>{ordered.map(col=><DragTH key={col.id} colId={col.id} label={col.label} dragRef={dragColRef} onDrop={id=>reorderCols(setColOrder,id)}/>)}</tr></thead>
                  <tbody>{filtered.map(r=>(
                    <tr key={r.id} style={{cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background=G50} onMouseLeave={e=>e.currentTarget.style.background=""} onDoubleClick={()=>openModal(r)}>
                      {ordered.map(col=><React.Fragment key={col.id}>{col.cell(r)}</React.Fragment>)}
                    </tr>
                  ))}</tbody>
                </table>;
              })()}
              {filtered.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:G400}}>Aucune entrée trouvée</div>}
            </div>
            <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:8,alignItems:"center",fontSize:11}}>
              <span style={{fontWeight:700,color:G400}}>Score :</span>
              {[{l:"★ ≥10 Excellent",bg:"#d1fae5",col:"#065f46",bdr:"#6ee7b7"},{l:"★ 6-9 Bon",bg:"#fef9c3",col:"#92400e",bdr:"#fde68a"},{l:"★ 3-5 Partiel",bg:"#ffedd5",col:"#9a3412",bdr:"#fed7aa"},{l:"— Aucun",bg:G100,col:G400,bdr:G200}].map(s=>(
                <span key={s.l} style={{background:s.bg,color:s.col,border:`1px solid ${s.bdr}`,borderRadius:99,padding:"2px 10px",fontWeight:600}}>{s.l}</span>
              ))}
              <span style={{color:G400}}>· Double-clic sur une ligne pour voir les matchs</span>
            </div>
          </>
        )}

        {/* ── Form ── */}
        {view==="form" && form && (
          <div style={{maxWidth:760,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
              <button onClick={()=>setView("liste")} style={{background:"none",border:"none",color:GOLD,fontSize:13,fontWeight:600,cursor:"pointer"}}>← Retour</button>
              <h2 style={{margin:0,fontSize:16,fontWeight:700,color:NAVY}}>{editId?"Modifier l'entrée":"Nouvelle entrée"} — {tab==="bouteilles"?"🫧 Bouteilles":"🍇 Vins Clairs"}</h2>
            </div>
            <div style={{background:WHITE,borderRadius:14,border:`1px solid ${G100}`,padding:28,boxShadow:"0 1px 6px rgba(13,27,62,.07)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
                <Field label="Courtier *"><Sel value={form.courtier} onChange={e=>f("courtier",e.target.value)}><option value="">--</option>{COURTIERS.map(c=><option key={c}>{c}</option>)}</Sel></Field>
                <Field label="Date"><Inp value={form.date} onChange={e=>f("date",e.target.value)} placeholder="JJ/MM/AAAA"/></Field>
                <Field label="Nom Client *"><Inp value={form.client} onChange={e=>f("client",e.target.value)} placeholder="Ex: BRUNO PAILLARD"/></Field>
                <Field label="Vend ou Recherche"><Sel value={form.besoin} onChange={e=>f("besoin",e.target.value)}><option>Vend</option><option>Recherche</option></Sel></Field>
                <Field label="Statut"><Sel value={form.statut} onChange={e=>f("statut",e.target.value)}>{STATUTS.map(s=><option key={s}>{s}</option>)}</Sel></Field>
                <Field label="Proposition"><Inp value={form.acheteur||""} onChange={e=>f("acheteur",e.target.value)}/></Field>
                <Field label={tab==="bouteilles"?"Quantité":"Quantité (hl)"}><Inp value={form.qte} onChange={e=>f("qte",e.target.value)}/></Field>
              </div>
              <hr style={{border:"none",borderTop:`1px solid ${G100}`,margin:"0 0 16px"}}/>
              <div style={{fontSize:10,fontWeight:700,color:GOLD,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>
                {tab==="bouteilles"?"Caractéristiques bouteilles":"Caractéristiques vins clairs"}
              </div>
              {tab==="bouteilles"
                ?<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                  <Field label="Format"><Sel value={form.format} onChange={e=>f("format",e.target.value)}>{FORMATS_BTL.map(v=><option key={v}>{v}</option>)}</Sel></Field>
                  <Field label="Modèle"><Inp value={form.modele||""} onChange={e=>f("modele",e.target.value)} placeholder="STD, CARMEN…"/></Field>
                  <Field label="Couleur verre"><Sel value={form.couleur} onChange={e=>f("couleur",e.target.value)}><option value="">--</option>{COULEURS.map(v=><option key={v}>{v}</option>)}</Sel></Field>
                  <Field label="Stade"><Sel value={form.stade} onChange={e=>f("stade",e.target.value)}><option value="">--</option>{STADES.map(v=><option key={v}>{v}</option>)}</Sel></Field>
                  <Field label="Qualité"><Sel value={form.qualite} onChange={e=>f("qualite",e.target.value)}><option value="">--</option>{QUALITES_BTL.map(v=><option key={v}>{v}</option>)}</Sel></Field>
                  <Field label="Cru"><Sel value={form.cru} onChange={e=>f("cru",e.target.value)}><option value="">--</option>{CRUS.map(v=><option key={v}>{v}</option>)}</Sel></Field>
                  <Field label="Assemblage"><Inp value={form.assemblage||""} onChange={e=>f("assemblage",e.target.value)} placeholder="60% PN / 40% CH"/></Field>
                  <Field label="Millésime">
                    <input list="millesimes-list" value={form.millesime||""} onChange={e=>f("millesime",e.target.value)} placeholder="2020" style={{...inp}}/>
                    <datalist id="millesimes-list">{MILLESIMES.map(y=><option key={y} value={y}/>)}</datalist>
                  </Field>
                  <Field label="Tirage"><Inp value={form.tirage||""} onChange={e=>f("tirage",e.target.value)}/></Field>
                  <Field label="Prix souhaité"><Inp value={form.prix||""} onChange={e=>f("prix",e.target.value)} placeholder="10,50 €"/></Field>
                </div>
                :<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                  <Field label="Vendange"><Inp value={form.vendange||""} onChange={e=>f("vendange",e.target.value)} placeholder="2025 ou Ass"/></Field>
                  <Field label="Cuvée / Tailles"><Sel value={form.formatVin||""} onChange={e=>f("formatVin",e.target.value)}><option value="">--</option>{FORMATS_VC.map(v=><option key={v}>{v}</option>)}</Sel></Field>
                  <Field label="Qualité"><Sel value={form.qualite||""} onChange={e=>f("qualite",e.target.value)}><option value="">--</option>{QUALITES_VC.map(v=><option key={v}>{v}</option>)}</Sel></Field>
                  <Field label="Cru"><Sel value={form.cru||""} onChange={e=>f("cru",e.target.value)}><option value="">--</option>{[...CRUS,"GC","GC et PC","PC"].map(v=><option key={v}>{v}</option>)}</Sel></Field>
                  <Field label="Cépage"><Sel value={form.cepage||""} onChange={e=>f("cepage",e.target.value)}><option value="">--</option>{CEPAGES.map(v=><option key={v}>{v}</option>)}</Sel></Field>
                  <Field label="Assemblage"><Inp value={form.assemblage||""} onChange={e=>f("assemblage",e.target.value)}/></Field>
                  <Field label="Crus / Villages"><Inp value={form.crus||""} onChange={e=>f("crus",e.target.value)} placeholder="BOUZY, Verzy…"/></Field>
                  <Field label="Prix (€/hl)"><Inp value={form.prix||""} onChange={e=>f("prix",e.target.value)} placeholder="1 600 €"/></Field>
                </div>
              }
              <div style={{marginTop:16}}>
                <Field label="Commentaires"><Txa value={form.commentaires||""} onChange={e=>f("commentaires",e.target.value)} placeholder="Notes, restrictions, conditions…"/></Field>
              </div>
              <div style={{display:"flex",gap:12,marginTop:20}}>
                <button onClick={saveForm} style={{flex:1,background:NAVY,color:GOLD,border:"none",borderRadius:10,padding:13,fontWeight:700,fontSize:14,cursor:"pointer"}}>
                  {editId?"💾 Enregistrer":"✅ Ajouter et voir les résultats"}
                </button>
                <button onClick={()=>setView("liste")} style={{padding:"13px 24px",background:G100,color:G600,border:"none",borderRadius:10,fontWeight:600,fontSize:14,cursor:"pointer"}}>Annuler</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
