  for (const row of data) {
    const c = row.courtier1;
    const b = byC[c] || mkStats();
    const rv = (row.renouvellement||'').toUpperCase();
    const mv = (row.nouveau_ct||'').toUpperCase();
    if (rv==='OUI'){b.oui++;all.oui++;}
    else if(rv==='NON'){b.non++;all.non++;}
    else{b.attente++;all.attente++;}
    if(mv==='N'){b.n++;all.n++;}
    else if(mv==='L'){b.l++;all.l++;}
    else if(mv==='T'){b.t++;all.t++;}
    else if(mv==='R'){b.r++;all.r++;}
    b.surf_r+=row.surf_renouveler||0; all.surf_r+=row.surf_renouveler||0;
    b.surf_s+=row.surf_signees||0;   all.surf_s+=row.surf_signees||0;
    b.vol_r+=row.vol_renouveler||0;  all.vol_r+=row.vol_renouveler||0;
    b.vol_s+=row.vol_signes||0;      all.vol_s+=row.vol_signes||0;
    byC[c]=b;
  }
  return {byC,all};
}

function fmt(n,d=2){return n?n.toFixed(d):'—';}
function fmtHa(n){return n?n.toFixed(4):'—';}

// ── RecapCard ───────────────────────────────────────────────────
function RecapCard({label,code,stats,active,onClick}){
  const total=stats.oui+stats.non+stats.attente;
  const signed=stats.oui;
  const pct=total>0?Math.round(signed/total*100):0;
  const color=code?COURTIER_COLORS[code]:'#0d1b3e';
  const totalSurf=stats.surf_r+stats.surf_s;
  const pctSurf=totalSurf>0?Math.round(stats.surf_s/totalSurf*100):0;
  return(
    <div onClick={onClick} style={{
      background:active?'#fdf8ee':'#fff',
      border:`2px solid ${active?'#C9A84C':'#e5e8f0'}`,
      borderRadius:14,padding:'14px 18px',minWidth:190,maxWidth:220,
      cursor:'pointer',transition:'all .15s',flexShrink:0,
      boxShadow:active?'0 4px 16px rgba(201,168,76,.25)':'0 1px 4px rgba(13,27,62,.06)'
    }}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontWeight:800,fontSize:12,color:color}}>{label}</div>
        <div style={{fontWeight:800,fontSize:18,color:color}}>{pct}%</div>
      </div>
      <div style={{background:'#f0f0f0',borderRadius:4,height:5,marginBottom:10}}>
        <div style={{background:pct>=80?'#2e7d32':pct>=50?'#C9A84C':'#e65100',height:5,borderRadius:4,width:pct+'%',transition:'width .4s'}}/>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
        <span style={{background:'#e8f5e9',color:'#2e7d32',borderRadius:6,padding:'2px 8px',fontSize:11,fontWeight:700}}>✓ {stats.oui}</span>
        <span style={{background:'#fce4ec',color:'#c62828',borderRadius:6,padding:'2px 8px',fontSize:11,fontWeight:700}}>✗ {stats.non}</span>
        <span style={{background:'#f5f5f5',color:'#777',borderRadius:6,padding:'2px 7px',fontSize:11}}>⏳ {stats.attente}</span>
      </div>
      {(stats.n||stats.l||stats.t||stats.r)>0&&(
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6,fontSize:10,color:'#888'}}>
          {stats.n>0&&<span style={{background:'#e3f2fd',color:'#1565c0',borderRadius:4,padding:'1px 5px',fontWeight:600}}>N:{stats.n}</span>}
          {stats.l>0&&<span style={{background:'#f3e5f5',color:'#6a1b9a',borderRadius:4,padding:'1px 5px',fontWeight:600}}>L:{stats.l}</span>}
          {stats.t>0&&<span style={{background:'#fff3e0',color:'#e65100',borderRadius:4,padding:'1px 5px',fontWeight:600}}>T:{stats.t}</span>}
          {stats.r>0&&<span style={{background:'#e8f5e9',color:'#2e7d32',borderRadius:4,padding:'1px 5px',fontWeight:600}}>R:{stats.r}</span>}
        </div>
      )}
      <div style={{fontSize:10,color:'#999',borderTop:'1px solid #f0f0f0',paddingTop:6,display:'flex',flexDirection:'column',gap:2}}>
        {stats.surf_r>0&&(
          <div>Ha: <strong style={{color:'#0d1b3e'}}>{fmtHa(stats.surf_s)}</strong> sign. / {fmtHa(stats.surf_r)} à sign.
            {pctSurf>0&&<span style={{color:'#C9A84C',fontWeight:700,marginLeft:4}}>{pctSurf}%</span>}
          </div>
        )}
        {(stats.vol_r>0||stats.vol_s>0)&&(
          <div>HL: <strong style={{color:'#0d1b3e'}}>{fmt(stats.vol_s,0)}</strong> sign. / {fmt(stats.vol_r,0)} à sign.</div>
        )}
        <div style={{color:'#aaa'}}>{total} contrats total</div>
      </div>
    </div>
  );
}

  const [sortDir,setSortDir]=useState('asc');

  const [gToken,setGToken]=useState(null);
  const [driveId,setDriveId]=useState(()=>localStorage.getItem(LS_DRIVE)||'');
  const [gClientId,setGClientId]=useState(()=>localStorage.getItem(LS_GCL)||DEFAULT_CLIENT_ID);

    try{const s=localStorage.getItem(LS_WIDTHS);return s?{...DEFAULT_WIDTHS,...JSON.parse(s)}:DEFAULT_WIDTHS;}catch{return DEFAULT_WIDTHS;}
  });
  const resizeRef=useRef(null);
  const pendingSaveRef=useRef(false);

  useEffect(()=>{localStorage.setItem(LS_DATA,JSON.stringify(data));},[data]);
  useEffect(()=>{localStorage.setItem(LS_WIDTHS,JSON.stringify(colWidths));},[colWidths]);
  useEffect(()=>{if(driveId)localStorage.setItem(LS_DRIVE,driveId);},[driveId]);

  const recap=useMemo(()=>computeRecap(data),[data]);

  const filtered=useMemo(()=>{
    let rows=data;
    if(filters.courtier) rows=rows.filter(r=>r.courtier1===filters.courtier||r.courtier2===filters.courtier);
    if(filters.type_contrat) rows=rows.filter(r=>r.type_contrat===filters.type_contrat);
    if(filters.renouvellement==='OUI') rows=rows.filter(r=>(r.renouvellement||'').toUpperCase()==='OUI');
    else if(filters.renouvellement==='NON') rows=rows.filter(r=>(r.renouvellement||'').toUpperCase()==='NON');
    else if(filters.renouvellement==='ATTENTE') rows=rows.filter(r=>!(r.renouvellement||'').trim());
    if(filters.cr_grc) rows=rows.filter(r=>r.cr_grc===filters.cr_grc);
    if(filters.search){
      const q=filters.search.toLowerCase();
      rows=rows.filter(r=>[r.livreurs,r.pressoirs,r.acheteurs,r.commentaire1,r.commentaire2,r.notes].some(v=>v&&v.toLowerCase().includes(q)));
    }
    if(sortCol){
      rows=[...rows].sort((a,b)=>{
        let va=a[sortCol],vb=b[sortCol];
        if(typeof va==='number'&&typeof vb==='number') return sortDir==='asc'?va-vb:vb-va;
        va=String(va||'');vb=String(vb||'');
        return sortDir==='asc'?va.localeCompare(vb,'fr'):vb.localeCompare(va,'fr');
      });
    }
    return rows;
  },[data,filters,sortCol,sortDir]);

  const updateRow=useCallback((id,field,value)=>{
    setData(prev=>prev.map(r=>r.id===id?{...r,[field]:value}:r));
    pendingSaveRef.current=true;
  },[]);

  const addRow=()=>{
    const newId=Math.max(0,...data.map(r=>r.id))+1;
    setData(prev=>[...prev,{
      id:newId,courtier1:'',courtier2:'',date:'',type_contrat:'',
      commentaire1:'',commentaire2:'',cr_grc:'',livreurs:'',pressoirs:'',acheteurs:'',
      renouvellement:'',nouveau_ct:'',durees:'',annees:'',
      surf_renouveler:0,surf_signees:0,vol_renouveler:0,vol_signes:0,civc:'',notes:''
    }]);
  };

  const reAuth=(cb)=>{
    google.accounts.oauth2.initTokenClient({
      client_id:gClientId,scope:DRIVE_SCOPE,
      callback:(resp)=>{if(!resp.error){setGToken(resp.access_token);cb(resp.access_token);}}
    }).requestAccessToken({prompt:''});
  };

  const loadFromDrive=async(token)=>{
    if(!driveId){setGStatus('Drive ID manquant');setShowSettings(true);return;}
    setGStatus('Chargement...');
    try{
      const r=await fetch(`https://www.googleapis.com/drive/v3/files/${driveId}?alt=media`,
        {headers:{Authorization:`Bearer ${token}`}});
      if(r.status===401){reAuth(loadFromDrive);return;}
      if(r.ok){setData(await r.json());setGStatus('Chargé ✓');}
      else setGStatus(`Erreur ${r.status}`);
    }catch{setGStatus('Erreur réseau');}
  };

  const saveToDrive=async(tokenOverride)=>{
    const t=tokenOverride||gToken;
    if(!t){

        client_id:gClientId,scope:DRIVE_SCOPE,
        callback:(resp)=>{if(!resp.error){setGToken(resp.access_token);saveToDrive(resp.access_token);}}

          <table style={{borderCollapse:'collapse',fontSize:12,tableLayout:'fixed',width:'max-content',minWidth:'100%'}}>
            <colgroup>
              {COLS.map(col=><col key={col.key} style={{width:gw(col.key)+'px',minWidth:gw(col.key)+'px'}}/>)}
            </colgroup>
            <thead style={{position:'sticky',top:0,zIndex:10}}>
              <tr style={{background:'#0d1b3e',color:'#C9A84C'}}>
                {COLS.map(col=>(
                  <th key={col.key}
                    style={{padding:'7px 6px',fontWeight:700,fontSize:10,letterSpacing:'0.05em',
                      textAlign:(col.type==='number'||col.type==='computed')?'right':'left',
                      cursor:col.type!=='computed'?'pointer':'default',
                      position:'relative',userSelect:'none',whiteSpace:'nowrap'}}
                    onClick={()=>col.type!=='computed'&&toggleSort(col.key)}>
                    {col.label}
                    {sortCol===col.key&&<span style={{marginLeft:3}}>{sortDir==='asc'?'↑':'↓'}</span>}
                    <div onMouseDown={e=>startResize(e,col.key)}
                      style={{position:'absolute',right:0,top:0,bottom:0,width:5,cursor:'col-resize',zIndex:1}}
                      onClick={e=>e.stopPropagation()}/>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((row,idx)=>(
                <ContratRow key={row.id} row={row} idx={idx} cols={COLS}
                  editCell={editCell} setEditCell={setEditCell}
                  onUpdate={updateRow} renouvStyle={renouvStyle} crStyle={crStyle}
                  gw={gw}/>
              ))}
              {filtered.length===0&&(
                <tr><td colSpan={COLS.length} style={{padding:'40px',textAlign:'center',color:'#aaa',fontSize:14}}>
                  Aucun résultat pour ces filtres
                </td></tr>
              )}
            </tbody>
          </table>
        </div>

      </main>
    </div>
  );
}

// ── ContratRow ───────────────────────────────────────────────────
function ContratRow({row,idx,cols,editCell,setEditCell,onUpdate,renouvStyle,crStyle,gw}){
  const isEd=(field)=>editCell&&editCell.rowId===row.id&&editCell.field===field;
  const startEd=(field)=>setEditCell({rowId:row.id,field});
  const stopEd=()=>setEditCell(null);
  const bg=idx%2===0?'#fff':'#fafbfd';

  const renderCell=(col)=>{
    if(col.key==='_diff_surf'){
      const diff=(row.surf_signees||0)-(row.surf_renouveler||0);
      const c=diff>0.0001?'#2e7d32':diff<-0.0001?'#c62828':'#ccc';
      return <td style={{padding:'5px 6px',textAlign:'right',color:c,fontWeight:Math.abs(diff)>0.0001?700:400,fontSize:11}}>
        {Math.abs(diff)>0.0001?(diff>0?'+':'')+diff.toFixed(4):'-'}
      </td>;
    }
    if(col.key==='_diff_vol'){
      const diff=(row.vol_signes||0)-(row.vol_renouveler||0);
      const c=diff>0.01?'#2e7d32':diff<-0.01?'#c62828':'#ccc';
      return <td style={{padding:'5px 6px',textAlign:'right',color:c,fontWeight:Math.abs(diff)>0.01?700:400,fontSize:11}}>
        {Math.abs(diff)>0.01?(diff>0?'+':'')+diff.toFixed(2):'-'}
      </td>;
    }

    const val=row[col.key];

    if(col.type==='renouv'){
      const rs=renouvStyle(val);
      if(isEd('renouvellement')) return(
        <td style={{padding:'2px 4px'}}>
          <select value={val||''} autoFocus onBlur={stopEd}
            onChange={e=>{onUpdate(row.id,'renouvellement',e.target.value);stopEd();}}
            style={{width:'100%',padding:'3px',fontSize:11,border:'2px solid #C9A84C',borderRadius:4}}>
            {RENOUV_OPTS.map(v=><option key={v} value={v}>{v||'(vide)'}</option>)}
          </select>
        </td>
      );
      return(
        <td onClick={()=>startEd('renouvellement')} style={{padding:'4px 6px',cursor:'pointer'}}>
          <span style={{background:rs.bg,color:rs.color,borderRadius:6,padding:'2px 8px',fontSize:11,fontWeight:700,display:'inline-block'}}>
            {rs.label}
          </span>
        </td>
      );
    }

    if(col.type==='cr'){
      if(isEd('cr_grc')) return(
        <td style={{padding:'2px 4px'}}>
          <select value={val||''} autoFocus onBlur={stopEd}
            onChange={e=>{onUpdate(row.id,'cr_grc',e.target.value);stopEd();}}
            style={{width:'100%',padding:'3px',fontSize:11,border:'2px solid #C9A84C',borderRadius:4}}>
            {CR_GRC_OPTS.map(v=><option key={v} value={v}>{v||'(vide)'}</option>)}
          </select>
        </td>
      );
      return(
        <td onClick={()=>startEd('cr_grc')} style={{padding:'4px 6px',cursor:'pointer',
          color:crStyle(val),fontWeight:val?600:400,fontSize:11}}>
          {val||'—'}
        </td>
      );
    }

    if(col.type==='select'){
      if(isEd(col.key)) return(
        <td style={{padding:'2px 4px'}}>
          <select value={val||''} autoFocus onBlur={stopEd}
            onChange={e=>{onUpdate(row.id,col.key,e.target.value);stopEd();}}
            style={{width:'100%',padding:'3px',fontSize:11,border:'2px solid #C9A84C',borderRadius:4}}>
            {col.opts.map(v=><option key={v} value={v}>{v||'(vide)'}</option>)}
          </select>
        </td>
      );
      const color=col.key==='courtier1'||col.key==='courtier2'?COURTIER_COLORS[val]:'inherit';
      return(
        <td onClick={()=>startEd(col.key)}
          style={{padding:'4px 6px',cursor:'pointer',fontWeight:color?700:400,color:color||'#333',overflow:'hidden',textOverflow:'ellipsis'}}
          title={val}>{val||''}</td>
      );
    }

    if(col.type==='number'){
      if(isEd(col.key)) return(
        <td style={{padding:'2px 4px'}}>
          <input type="number" step="0.0001" defaultValue={val||''}
            autoFocus
            onBlur={e=>{onUpdate(row.id,col.key,parseFloat(e.target.value)||0);stopEd();}}
            onKeyDown={e=>{
              if(e.key==='Enter'){onUpdate(row.id,col.key,parseFloat(e.target.value)||0);stopEd();}
              if(e.key==='Escape') stopEd();
            }}
            style={{width:'100%',padding:'3px',fontSize:11,border:'2px solid #C9A84C',borderRadius:4,textAlign:'right'}}/>
        </td>
      );
      return(
        <td onClick={()=>startEd(col.key)}
          style={{padding:'4px 6px',textAlign:'right',cursor:'pointer',color:val>0?'#0d1b3e':'#ccc',fontSize:11}}>
          {val>0?val.toFixed(4):'—'}
        </td>
      );
    }

    // text
    if(isEd(col.key)) return(
      <td style={{padding:'2px 4px'}}>
        <input defaultValue={val||''} autoFocus
          onBlur={e=>{onUpdate(row.id,col.key,e.target.value);stopEd();}}
          onKeyDown={e=>{
            if(e.key==='Enter'){onUpdate(row.id,col.key,e.target.value);stopEd();}
            if(e.key==='Escape') stopEd();
          }}
          style={{width:'100%',padding:'3px',fontSize:11,border:'2px solid #C9A84C',borderRadius:4}}/>
      </td>
    );
    return(
      <td onClick={()=>startEd(col.key)}
        style={{padding:'4px 6px',cursor:'pointer',overflow:'hidden',textOverflow:'ellipsis',color:val?'#333':'#ddd'}}
        title={val}>{val||''}</td>
    );
  };

  return(
    <tr style={{background:bg,borderBottom:'1px solid #f0f2f7'}}
      onMouseEnter={e=>e.currentTarget.style.background='#f0f6ff'}
      onMouseLeave={e=>e.currentTarget.style.background=bg}>
      {cols.map(col=>(
        <React.Fragment key={col.key}>{renderCell(col)}</React.Fragment>
      ))}
    </tr>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
